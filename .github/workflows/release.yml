name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            label: Windows x64
            artifact: windows-x64
          - target: i686-pc-windows-msvc
            label: Windows x86
            artifact: windows-x86
          - target: aarch64-pc-windows-msvc
            label: Windows ARM64 (Snapdragon)
            artifact: windows-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.ref_name }}"
          $zipName = "tppanel-$version-${{ matrix.artifact }}"
          $releaseDir = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Path $zipName -Force

          # Verify all expected binaries exist before copying
          foreach ($exe in @("tppanel.exe", "tmuxplugins.exe", "tmuxthemes.exe")) {
            $path = Join-Path $releaseDir $exe
            if (-not (Test-Path $path)) {
              Write-Error "FATAL: Expected binary '$path' not found! Build may have failed silently."
              Get-ChildItem $releaseDir -Filter "*.exe" | ForEach-Object { Write-Output "  Found: $($_.FullName) ($($_.Length) bytes)" }
              exit 1
            }
          }

          Copy-Item "$releaseDir/tppanel.exe" "$zipName/tppanel.exe" -ErrorAction Stop
          Copy-Item "$releaseDir/tmuxplugins.exe" "$zipName/tmuxplugins.exe" -ErrorAction Stop
          Copy-Item "$releaseDir/tmuxthemes.exe" "$zipName/tmuxthemes.exe" -ErrorAction Stop
          Copy-Item "README.md" "$zipName/" -ErrorAction Stop
          Copy-Item "LICENSE" "$zipName/" -ErrorAction Stop
          Compress-Archive -Path "$zipName/*" -DestinationPath "$zipName.zip"

          # Verify zip contents
          $entries = [System.IO.Compression.ZipFile]::OpenRead("$zipName.zip").Entries.Name
          foreach ($exe in @("tppanel.exe", "tmuxplugins.exe", "tmuxthemes.exe")) {
            if ($exe -notin $entries) {
              Write-Error "FATAL: '$exe' missing from zip archive!"
              exit 1
            }
          }
          Write-Output "Zip contains: $($entries -join ', ')"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tppanel-${{ matrix.artifact }}
          path: tppanel-*-${{ matrix.artifact }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "*.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            tppanel-windows-x64/*.zip
            tppanel-windows-x86/*.zip
            tppanel-windows-arm64/*.zip
          body: |
            ## Tmux Plugin Panel ${{ github.ref_name }}
            
            A full-fledged TUI plugin manager for tmux — the modern alternative to TPM.
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows x64 (Intel/AMD 64-bit) | `tppanel-${{ github.ref_name }}-windows-x64.zip` |
            | Windows x86 (Intel/AMD 32-bit) | `tppanel-${{ github.ref_name }}-windows-x86.zip` |
            | Windows ARM64 (Snapdragon/Surface Pro X) | `tppanel-${{ github.ref_name }}-windows-arm64.zip` |
            
            ### Installation
            
            **Via Scoop (recommended):**
            ```powershell
            scoop bucket add tppanel https://github.com/marlocarlo/scoop-tppanel
            scoop install tppanel
            ```
            
            **Via Chocolatey:**
            ```powershell
            choco install tppanel
            ```
            
            **Via WinGet:**
            ```powershell
            winget install marlocarlo.tppanel
            ```
            
            **Via Cargo:**
            ```powershell
            cargo install tppanel
            ```
            
            **Manual Installation:**
            1. Download the zip matching your architecture
            2. Extract to a folder in your PATH
            3. `tppanel`, `tmuxplugins`, and `tmuxthemes` commands will all be available
            
            ### What's Included
            - `tppanel.exe` — Main TUI plugin manager
            - `tmuxplugins.exe` — Alias (opens Browse tab)
            - `tmuxthemes.exe` — Alias (opens Themes browser)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crate compiles
        run: cargo check 2>&1
        shell: pwsh

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for release assets to stabilize on GitHub CDN
        shell: pwsh
        run: |
          Write-Output "Waiting 60s for GitHub release CDN propagation..."
          Start-Sleep 60

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $ver  Tag: $tag"

      - name: Download x64 release zip from GitHub Release
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $zipUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/tppanel-$tag-windows-x64.zip"
          Write-Output "Downloading $zipUrl"
          $ok = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              Invoke-WebRequest -Uri $zipUrl -OutFile "tppanel-release.zip" -UseBasicParsing -ErrorAction Stop
              $ok = $true; break
            } catch {
              if ($i -eq 5) { throw }
              Write-Output "Retry $i..."
              Start-Sleep ($i * 10)
            }
          }

      - name: Compute SHA256 checksum
        id: checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash "tppanel-release.zip" -Algorithm SHA256).Hash
          echo "SHA256=$hash" >> $env:GITHUB_OUTPUT
          Write-Output "SHA256: $hash"

      - name: Verify checksum (download again and compare)
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $zipUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/tppanel-$tag-windows-x64.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile "tppanel-verify.zip" -UseBasicParsing
          $hash1 = (Get-FileHash "tppanel-release.zip" -Algorithm SHA256).Hash
          $hash2 = (Get-FileHash "tppanel-verify.zip" -Algorithm SHA256).Hash
          if ($hash1 -ne $hash2) {
            Write-Error "Checksum mismatch! $hash1 vs $hash2"
            exit 1
          }
          Write-Output "Checksum verified: $hash1"

      - name: Generate chocolateyinstall.ps1
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $tag = "${{ steps.version.outputs.TAG }}"
          $hash = "${{ steps.checksum.outputs.SHA256 }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/tppanel-$tag-windows-x64.zip"

          $script = @"
          `$ErrorActionPreference = 'Stop'

          `$toolsDir = "`$(Split-Path -Parent `$MyInvocation.MyCommand.Definition)"
          `$url64 = '$url'

          `$packageArgs = @{
            packageName    = `$env:ChocolateyPackageName
            unzipLocation  = `$toolsDir
            url64bit       = `$url64
            checksum64     = '$hash'
            checksumType64 = 'sha256'
          }

          Install-ChocolateyZipPackage @packageArgs

          # Create shims for tppanel, tmuxplugins, and tmuxthemes
          `$tppanelPath = Join-Path `$toolsDir "tppanel.exe"
          `$tmuxpluginsPath = Join-Path `$toolsDir "tmuxplugins.exe"
          `$tmuxthemesPath = Join-Path `$toolsDir "tmuxthemes.exe"

          Install-BinFile -Name "tppanel" -Path `$tppanelPath
          Install-BinFile -Name "tmuxplugins" -Path `$tmuxpluginsPath
          Install-BinFile -Name "tmuxthemes" -Path `$tmuxthemesPath
          "@

          $script = ($script -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"

          New-Item -ItemType Directory -Path "choco-pkg/tools" -Force | Out-Null
          Set-Content -Path "choco-pkg/tools/chocolateyinstall.ps1" -Value $script -NoNewline
          Write-Output "Generated chocolateyinstall.ps1 with checksum $hash"

      - name: Generate chocolateyuninstall.ps1
        shell: pwsh
        run: |
          $script = @"
          Uninstall-BinFile -Name "tppanel"
          Uninstall-BinFile -Name "tmuxplugins"
          Uninstall-BinFile -Name "tmuxthemes"
          "@
          $script = ($script -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content -Path "choco-pkg/tools/chocolateyuninstall.ps1" -Value $script -NoNewline

      - name: Generate nuspec
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.VERSION }}"
          $nuspec = @"
          <?xml version="1.0" encoding="utf-8"?>
          <package xmlns="http://schemas.microsoft.com/packaging/2015/06/nuspec.xsd">
            <metadata>
              <id>tppanel</id>
              <version>$ver</version>
              <title>tppanel — Tmux Plugin Panel</title>
              <authors>marlocarlo</authors>
              <owners>marlocarlo</owners>
              <licenseUrl>https://github.com/${{ github.repository }}/blob/master/LICENSE</licenseUrl>
              <projectUrl>https://github.com/${{ github.repository }}</projectUrl>
              <iconUrl>https://raw.githubusercontent.com/${{ github.repository }}/master/icon.svg</iconUrl>
              <requireLicenseAcceptance>false</requireLicenseAcceptance>
              <description>A full-fledged TUI plugin panel for tmux — the modern alternative to TPM. Browse, install, remove, update, and theme your tmux from a beautiful terminal interface. Includes tppanel, tmuxplugins, and tmuxthemes commands.</description>
              <summary>TUI plugin manager for tmux — browse, install, theme (TPM alternative)</summary>
              <releaseNotes>https://github.com/${{ github.repository }}/releases</releaseNotes>
              <tags>tmux plugin manager tui terminal theme tppanel tmuxplugins tmuxthemes</tags>
              <packageSourceUrl>https://github.com/${{ github.repository }}</packageSourceUrl>
              <docsUrl>https://github.com/${{ github.repository }}#readme</docsUrl>
              <bugTrackerUrl>https://github.com/${{ github.repository }}/issues</bugTrackerUrl>
            </metadata>
            <files>
              <file src="tools\**" target="tools" />
            </files>
          </package>
          "@
          $nuspec = ($nuspec -split "`n" | ForEach-Object { $_.TrimStart() }) -join "`n"
          Set-Content -Path "choco-pkg/tppanel.nuspec" -Value $nuspec -NoNewline

      - name: Pack Chocolatey package
        shell: pwsh
        run: |
          cd choco-pkg
          choco pack tppanel.nuspec
          Get-ChildItem *.nupkg

      - name: Push to Chocolatey
        shell: pwsh
        run: |
          cd choco-pkg
          $nupkg = (Get-ChildItem *.nupkg)[0].Name
          choco push $nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}
          Write-Output "Successfully pushed $nupkg to Chocolatey"

  publish-scoop:
    name: Publish to Scoop Bucket
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets to stabilize on GitHub CDN
        run: |
          echo "Waiting 60s for GitHub release CDN propagation..."
          sleep 60

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          ver="${tag#v}"
          echo "VERSION=$ver" >> $GITHUB_OUTPUT
          echo "TAG=$tag" >> $GITHUB_OUTPUT

      - name: Download release zips and compute SHA256
        id: hashes
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"
          base="https://github.com/$repo/releases/download/$tag"

          for arch in x64 x86 arm64; do
            url="$base/tppanel-$tag-windows-$arch.zip"
            echo "Downloading $url"
            for i in 1 2 3 4 5; do
              if curl -sL -o "installer-$arch.zip" "$url"; then break; fi
              echo "Retry $i..."
              sleep $((i * 10))
            done
            hash=$(sha256sum "installer-$arch.zip" | awk '{print $1}')
            upper_arch=$(echo "$arch" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            echo "SHA256_$upper_arch=$hash" >> $GITHUB_OUTPUT
            echo "  $arch: $hash"
          done

      - name: Clone scoop bucket repo
        shell: bash
        run: |
          git clone https://x-access-token:${{ secrets.WINGET_PAT }}@github.com/marlocarlo/scoop-tppanel.git scoop-bucket

      - name: Update scoop manifest
        shell: bash
        run: |
          ver="${{ steps.version.outputs.VERSION }}"
          tag="${{ steps.version.outputs.TAG }}"
          sha64="${{ steps.hashes.outputs.SHA256_X64 }}"
          sha86="${{ steps.hashes.outputs.SHA256_X86 }}"
          shaarm="${{ steps.hashes.outputs.SHA256_ARM64 }}"
          repo="${{ github.repository }}"
          base="https://github.com/$repo/releases/download/$tag"

          mkdir -p scoop-bucket/bucket

          cat > scoop-bucket/bucket/tppanel.json << MANIFEST
          {
              "version": "$ver",
              "description": "A full-fledged TUI plugin panel for tmux — the modern alternative to TPM",
              "homepage": "https://github.com/marlocarlo/Tmux-Plugin-Panel",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "$base/tppanel-$tag-windows-x64.zip",
                      "hash": "$sha64"
                  },
                  "32bit": {
                      "url": "$base/tppanel-$tag-windows-x86.zip",
                      "hash": "$sha86"
                  },
                  "arm64": {
                      "url": "$base/tppanel-$tag-windows-arm64.zip",
                      "hash": "$shaarm"
                  }
              },
              "bin": [
                  "tppanel.exe",
                  "tmuxplugins.exe",
                  "tmuxthemes.exe"
              ],
              "checkver": {
                  "github": "https://github.com/marlocarlo/Tmux-Plugin-Panel"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/marlocarlo/Tmux-Plugin-Panel/releases/download/v\$version/tppanel-v\$version-windows-x64.zip"
                      },
                      "32bit": {
                          "url": "https://github.com/marlocarlo/Tmux-Plugin-Panel/releases/download/v\$version/tppanel-v\$version-windows-x86.zip"
                      },
                      "arm64": {
                          "url": "https://github.com/marlocarlo/Tmux-Plugin-Panel/releases/download/v\$version/tppanel-v\$version-windows-arm64.zip"
                      }
                  }
              }
          }
          MANIFEST

          cd scoop-bucket
          python3 -c "
          import json
          with open('bucket/tppanel.json') as f:
              data = json.load(f)
          with open('bucket/tppanel.json', 'w', newline='\n') as f:
              json.dump(data, f, indent=4)
              f.write('\n')
          "

      - name: Push updated manifest to scoop bucket
        shell: bash
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/tppanel.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update tppanel to ${{ steps.version.outputs.VERSION }}"
          git push

  publish-winget:
    name: Publish to WinGet
    needs: release
    runs-on: windows-latest
    steps:
      - name: Wait for release assets to stabilize on GitHub CDN
        shell: pwsh
        run: |
          Write-Output "Waiting 90s for GitHub release CDN propagation..."
          Start-Sleep 90

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          Write-Output "Version: $ver  Tag: $tag"

      - name: Download release zips and compute SHA256
        id: hashes
        shell: pwsh
        run: |
          $tag  = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $base = "https://github.com/$repo/releases/download/$tag"

          $archs = @(
            @{ label = "x64";   artifact = "windows-x64"  },
            @{ label = "x86";   artifact = "windows-x86"  },
            @{ label = "arm64"; artifact = "windows-arm64" }
          )

          foreach ($a in $archs) {
            $url  = "$base/tppanel-$tag-$($a.artifact).zip"
            $file = "installer-$($a.label).zip"
            Write-Output "Downloading $url ..."
            $ok = $false
            for ($i = 1; $i -le 5; $i++) {
              try {
                Invoke-WebRequest -Uri $url -OutFile $file -UseBasicParsing -ErrorAction Stop
                $ok = $true; break
              } catch {
                if ($i -eq 5) { throw }
                Start-Sleep ($i * 10)
              }
            }
            $hash = (Get-FileHash $file -Algorithm SHA256).Hash
            Write-Output "  SHA256 ($($a.label)): $hash"
            echo "SHA256_$($a.label.ToUpper())=$hash" >> $env:GITHUB_OUTPUT
          }

      - name: Verify SHA256 checksums (re-download and compare)
        shell: pwsh
        run: |
          $tag  = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $base = "https://github.com/$repo/releases/download/$tag"
          $archs = @("x64","x86","arm64")
          foreach ($arch in $archs) {
            $url   = "$base/tppanel-$tag-windows-$arch.zip"
            $orig  = "installer-$arch.zip"
            $verify = "verify-$arch.zip"
            Invoke-WebRequest -Uri $url -OutFile $verify -UseBasicParsing
            $h1 = (Get-FileHash $orig  -Algorithm SHA256).Hash
            $h2 = (Get-FileHash $verify -Algorithm SHA256).Hash
            if ($h1 -ne $h2) {
              Write-Error "SHA256 mismatch for $arch! orig=$h1 verify=$h2"
              exit 1
            }
            Write-Output "Verified $arch : $h1"
          }

      - name: Download wingetcreate
        shell: pwsh
        run: |
          $wgcPath = "$env:TEMP\wingetcreate.exe"
          Invoke-WebRequest -Uri https://aka.ms/wingetcreate/latest -OutFile $wgcPath -UseBasicParsing
          Write-Output "WGC_PATH=$wgcPath" >> $env:GITHUB_ENV
          Write-Output "Downloaded wingetcreate to $wgcPath"

      - name: Create WinGet manifests
        shell: pwsh
        run: |
          $ver  = "${{ steps.version.outputs.VERSION }}"
          $tag  = "${{ steps.version.outputs.TAG }}"
          $repo = "${{ github.repository }}"
          $base = "https://github.com/$repo/releases/download/$tag"

          $pkgId  = "marlocarlo.tppanel"
          $outDir = "winget-manifests"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $sha64   = "${{ steps.hashes.outputs.SHA256_X64 }}"
          $sha86   = "${{ steps.hashes.outputs.SHA256_X86 }}"
          $shaArm  = "${{ steps.hashes.outputs.SHA256_ARM64 }}"
          $url64   = "$base/tppanel-$tag-windows-x64.zip"
          $url86   = "$base/tppanel-$tag-windows-x86.zip"
          $urlArm  = "$base/tppanel-$tag-windows-arm64.zip"

          # ---- Version manifest ----
          @"
          PackageIdentifier: $pkgId
          PackageVersion: $ver
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.9.0
          "@ -replace '(?m)^\s{10}','' | Set-Content "$outDir/$pkgId.yaml" -Encoding utf8NoBOM

          # ---- Installer manifest ----
          @"
          PackageIdentifier: $pkgId
          PackageVersion: $ver
          Platform:
          - Windows.Desktop
          MinimumOSVersion: 10.0.0.0
          InstallerType: zip
          NestedInstallerType: portable
          NestedInstallerFiles:
          - RelativeFilePath: tppanel.exe
            PortableCommandAlias: tppanel
          - RelativeFilePath: tmuxplugins.exe
            PortableCommandAlias: tmuxplugins
          - RelativeFilePath: tmuxthemes.exe
            PortableCommandAlias: tmuxthemes
          Installers:
          - Architecture: x64
            InstallerUrl: $url64
            InstallerSha256: $sha64
          - Architecture: x86
            InstallerUrl: $url86
            InstallerSha256: $sha86
          - Architecture: arm64
            InstallerUrl: $urlArm
            InstallerSha256: $shaArm
          ManifestType: installer
          ManifestVersion: 1.9.0
          "@ -replace '(?m)^\s{10}','' | Set-Content "$outDir/$pkgId.installer.yaml" -Encoding utf8NoBOM

          # ---- Default locale manifest ----
          @"
          PackageIdentifier: $pkgId
          PackageVersion: $ver
          PackageLocale: en-US
          Publisher: marlocarlo
          PublisherUrl: https://github.com/marlocarlo
          PublisherSupportUrl: https://github.com/marlocarlo/Tmux-Plugin-Panel/issues
          PackageName: tppanel
          PackageUrl: https://github.com/marlocarlo/Tmux-Plugin-Panel
          License: MIT
          LicenseUrl: https://github.com/marlocarlo/Tmux-Plugin-Panel/blob/master/LICENSE
          Copyright: Copyright (c) marlocarlo
          ShortDescription: A full-fledged TUI plugin panel for tmux — the modern alternative to TPM
          Description: |-
            Tmux Plugin Panel is a TUI plugin manager for tmux, providing a complete
            graphical interface to browse, install, remove, update, and theme your tmux
            setup. Ships with tppanel, tmuxplugins, and tmuxthemes commands.
            Supports both tmux (Linux/macOS) and PSMux (Windows).
          Moniker: tppanel
          Tags:
          - tmux
          - plugin
          - manager
          - tui
          - terminal
          - theme
          - tppanel
          - tmuxplugins
          - tmuxthemes
          ReleaseNotesUrl: https://github.com/marlocarlo/Tmux-Plugin-Panel/releases/tag/$tag
          ManifestType: defaultLocale
          ManifestVersion: 1.9.0
          "@ -replace '(?m)^\s{10}','' | Set-Content "$outDir/$pkgId.locale.en-US.yaml" -Encoding utf8NoBOM

          Write-Output "Manifests created:"
          Get-ChildItem $outDir | ForEach-Object {
            Write-Output "  $($_.Name)"
            Get-Content $_.FullName | ForEach-Object { Write-Output "    $_" }
            Write-Output ""
          }

      - name: Submit manifests to WinGet (PR to microsoft/winget-pkgs)
        shell: pwsh
        run: |
          & $env:WGC_PATH submit "winget-manifests" --token "${{ secrets.WINGET_PAT }}" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Error "wingetcreate submit failed (exit $LASTEXITCODE)."
            exit 1
          }
          Write-Output "PR submitted to microsoft/winget-pkgs!"
          Write-Output "Track at: https://github.com/microsoft/winget-pkgs/pulls?q=is%3Apr+marlocarlo.tppanel"
